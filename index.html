<link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72"><rect width="72" height="72" rx="20" fill="%230E7C74"/><g fill="none" stroke="%23fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"><path d="M22 22 L38 36 L22 50"/><path d="M36 22 L52 36 L36 50" opacity=".55"/></g></svg>'>
<link rel="mask-icon" href="favicon-mask.svg" color="#0E7C74">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<style>
  :root{
    --canvas:#FBFBFA; --card:#ffffff; --line:#EDEEEF; --line2:#E2E4E5;
    --ink:#16181A; --sub:#8A9096; --mut:#A2A7AC;
    --teal:#0E7C74; --teal-deep:#0E5C56; --chip:#E4F1EF; --mint:#5FD3C6;
    --hero:#16181A; --hero-ink:#ffffff; --hero-sub:#8F979E; --hero-track:#2B2E31;
    --track:#EBECED; --warn:#B26A00; --crit:#C23434;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --canvas:#131415; --card:#1D1F21; --line:#2A2D30; --line2:#33373B;
      --ink:#F2F3F4; --sub:#9AA0A6; --mut:#6E747A;
      --teal:#2FB3A8; --teal-deep:#5FD3C6; --chip:#17322F; --mint:#5FD3C6;
      --hero:#0E1011; --hero-ink:#ffffff; --hero-sub:#8F979E; --hero-track:#2B2E31;
      --track:#2A2D30; --warn:#E0A33C; --crit:#E66767;
    }
  }
  :root[data-theme="light"]{
    --canvas:#FBFBFA; --card:#ffffff; --line:#EDEEEF; --line2:#E2E4E5;
    --ink:#16181A; --sub:#8A9096; --mut:#A2A7AC;
    --teal:#0E7C74; --teal-deep:#0E5C56; --chip:#E4F1EF; --mint:#5FD3C6;
    --hero:#16181A; --hero-ink:#ffffff; --hero-sub:#8F979E; --hero-track:#2B2E31;
    --track:#EBECED; --warn:#B26A00; --crit:#C23434;
  }
  :root[data-theme="dark"]{
    --canvas:#131415; --card:#1D1F21; --line:#2A2D30; --line2:#33373B;
    --ink:#F2F3F4; --sub:#9AA0A6; --mut:#6E747A;
    --teal:#2FB3A8; --teal-deep:#5FD3C6; --chip:#17322F; --mint:#5FD3C6;
    --hero:#0E1011; --hero-ink:#ffffff; --hero-sub:#8F979E; --hero-track:#2B2E31;
    --track:#2A2D30; --warn:#E0A33C; --crit:#E66767;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--canvas);color:var(--ink);
    font:15px/1.5 'Schibsted Grotesk',-apple-system,'Segoe UI',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:560px;margin:0 auto;padding:0 18px 92px}

  header.app{position:sticky;top:0;z-index:20;background:var(--canvas);margin:0 -18px;padding:16px 18px 12px;border-bottom:1px solid var(--line)}
  .brand{display:flex;justify-content:space-between;align-items:center}
  .lockup{display:flex;align-items:center;gap:9px}
  .lockup .word{font-weight:800;font-size:17px;letter-spacing:-.02em}
  .streak{display:flex;align-items:center;gap:6px;background:var(--chip);padding:5px 11px;border-radius:20px;
    font-weight:700;font-size:12px;color:var(--teal)}
  .streak .dot{width:6px;height:6px;border-radius:50%;background:var(--teal)}

  nav.tabs{position:fixed;bottom:0;left:0;right:0;z-index:30;background:var(--card);border-top:1px solid var(--line);
    display:flex;justify-content:space-around;padding:12px 8px calc(12px + env(safe-area-inset-bottom))}
  nav.tabs button{background:none;border:none;cursor:pointer;font:500 13px 'Schibsted Grotesk',system-ui,sans-serif;color:var(--mut);padding:4px 14px}
  nav.tabs button.on{color:var(--ink);font-weight:700}
  nav.tabs button:focus-visible{outline:2px solid var(--teal);outline-offset:2px;border-radius:6px}

  section.tab{display:none}
  section.tab.on{display:block;animation:fade .18s ease}
  @keyframes fade{from{opacity:0;transform:translateY(3px)}to{opacity:1}}
  @media(prefers-reduced-motion:reduce){section.tab.on{animation:none}.meter i,.hbar i{transition:none}}

  .eyebrow{font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);margin:20px 0 9px;display:flex;justify-content:space-between;align-items:baseline;gap:14px}
  .eyebrow .note{text-align:right;flex:1}
  .eyebrow a,.eyebrow button{font:600 11px 'Schibsted Grotesk',system-ui;color:var(--teal);background:none;border:none;cursor:pointer;padding:0;letter-spacing:.02em;text-transform:none;text-decoration:none}

  .hero{background:var(--hero);border-radius:20px;padding:18px 19px;color:var(--hero-ink);margin:6px 0 12px}
  .hero .hsub{color:var(--hero-sub);font-size:11px;font-weight:600;letter-spacing:.04em}
  .hero .big{font-weight:800;font-size:40px;line-height:.95;letter-spacing:-.02em}
  .hero .mint{color:var(--mint)}
  .hbar{height:6px;background:var(--hero-track);border-radius:4px;overflow:hidden}
  .hbar i{display:block;height:100%;background:var(--mint);border-radius:4px;transition:width .25s ease}

  .wcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin:9px 0}
  .wcard h3{margin:0;font-size:15px;font-weight:700}
  .sub{color:var(--sub);font-size:13px;margin:3px 0}
  .fine{color:var(--mut);font-size:12.5px}
  .cue{color:var(--sub);font-size:13px;font-style:italic;margin:5px 0 0}
  .cue b{color:var(--teal);font-style:normal;font-weight:700}
  .num{font-variant-numeric:tabular-nums;white-space:nowrap}

  .stat3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:12px 0}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px}
  .stat .l{font-weight:600;font-size:10px;letter-spacing:.05em;color:var(--mut);text-transform:uppercase}
  .stat .v{font-weight:800;font-size:18px;line-height:1;margin-top:6px;font-variant-numeric:tabular-nums}
  .stat .n{font-weight:500;font-size:10.5px;color:var(--sub);margin-top:3px}
  .stat .n.t{color:var(--teal)}

  .plan{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--line2);border-radius:14px;padding:13px 15px;margin:9px 0;display:flex;gap:13px;align-items:flex-start}
  .plan.hot{border-left-color:var(--teal)}
  .plan .t{font-weight:700;font-size:15px;line-height:1.15}
  .plan .d{font-weight:500;font-size:12px;color:var(--sub);margin-top:3px}
  .plan.donetext .t{color:var(--mut);text-decoration:line-through}

  .ring{width:26px;height:26px;border-radius:50%;border:2px solid var(--line2);background:none;cursor:pointer;flex:none;margin-top:2px;
    display:flex;align-items:center;justify-content:center;font:700 13px 'Schibsted Grotesk';color:transparent;padding:0}
  .ring.on{background:var(--teal);border-color:var(--teal);color:#fff}
  .ring:focus-visible{outline:2px solid var(--teal);outline-offset:2px}

  .btn{background:var(--teal);color:#fff;border:none;border-radius:9px;padding:8px 14px;font:600 12px 'Schibsted Grotesk',system-ui;cursor:pointer}
  .btn.ghost{background:none;border:1px solid var(--line2);color:var(--sub)}
  .btn.chipbtn{background:var(--chip);color:var(--teal)}
  .btn:focus-visible{outline:2px solid var(--teal);outline-offset:2px}

  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chips button{background:var(--card);border:1px solid var(--line2);border-radius:20px;padding:6px 12px;
    font:600 12px 'Schibsted Grotesk',system-ui;color:var(--sub);cursor:pointer}
  .chips button.on{background:var(--teal);border-color:var(--teal);color:#fff}

  .wxnote{border-left:3px solid var(--warn);background:var(--chip);border-radius:0 9px 9px 0;padding:8px 12px;margin-top:9px;font-size:12.5px}
  .callout{border-left:3px solid var(--teal);background:var(--chip);border-radius:0 10px 10px 0;padding:10px 14px;margin:10px 0;font-size:13px}
  .callout.warn{border-left-color:var(--warn)}
  .callout.crit{border-left-color:var(--crit)}

  .meter{height:6px;background:var(--track);border-radius:4px;overflow:hidden}
  .meter i{display:block;height:100%;background:var(--teal);border-radius:4px;transition:width .25s ease}

  .ex{border-bottom:1px solid var(--line);padding:13px 0}
  .ex:last-child{border-bottom:none;padding-bottom:4px}
  .ex .top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .ex .nm{font-weight:700;font-size:15px}
  .ex .rx{color:var(--teal);font-size:12.5px;font-weight:600;white-space:nowrap;font-variant-numeric:tabular-nums}
  .last{font-size:12px;color:var(--mut);margin-top:5px;font-variant-numeric:tabular-nums}
  .sets{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
  .set{display:flex;align-items:center;gap:4px;background:var(--track);border-radius:9px;padding:5px 7px}
  .set input{width:50px;border:none;background:var(--card);color:var(--ink);border-radius:7px;
    padding:6px 4px;font:700 13px 'Schibsted Grotesk',system-ui;text-align:center;font-variant-numeric:tabular-nums}
  .set input:focus-visible{outline:2px solid var(--teal)}
  .set .x{color:var(--mut);font-size:11px}
  .pill{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;border-radius:7px;padding:3px 8px}
  .pill.now{background:var(--teal);color:#fff}
  .pill.hint{background:var(--chip);color:var(--teal)}

  table.plain{width:100%;border-collapse:collapse;font-size:13.5px}
  table.plain td{padding:7px 8px 7px 0;border-bottom:1px solid var(--line);vertical-align:top}
  table.plain tr:last-child td{border-bottom:none}
  .scrollx{overflow-x:auto}

  .groitem{display:flex;align-items:center;gap:11px;padding:8px 0;border-bottom:1px solid var(--line);cursor:pointer}
  .groitem:last-child{border-bottom:none}
  .groitem input{width:19px;height:19px;accent-color:var(--teal);flex:none;cursor:pointer}
  .groitem .n{flex:1;font-weight:600;font-size:13.5px}
  .groitem.got .n{color:var(--mut);text-decoration:line-through}
  .groitem .q{color:var(--sub);font-size:12px}
  .groitem .p{color:var(--mut);font-size:12px;font-variant-numeric:tabular-nums;width:36px;text-align:right}

  .milestone{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin:8px 0}
  .milestone.next{border:2px solid var(--teal)}
  .milestone.todo{opacity:.6}
  .mk{width:22px;height:22px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font:700 12px 'Schibsted Grotesk'}
  .milestone.done .mk{background:var(--teal);color:#fff}
  .milestone.next .mk{border:2px solid var(--teal);color:var(--teal);font-size:11px}
  .milestone.todo .mk{border:2px solid var(--line2)}

  .weightform{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .weightform input[type=number]{width:104px;font-size:20px;font-weight:800;padding:9px;border:1px solid var(--line2);
    border-radius:10px;background:var(--card);color:var(--ink);font-variant-numeric:tabular-nums;text-align:center}
  .weightform input[type=date]{padding:10px;border:1px solid var(--line2);border-radius:10px;background:var(--card);color:var(--ink);font-size:13px;font-family:inherit}

  .chartbox{position:relative}
  .chartbox svg{display:block;width:100%;height:auto}
  .tip{position:absolute;pointer-events:none;background:var(--mint);color:#16181A;border-radius:6px;
    padding:4px 9px;font-size:12px;font-weight:700;white-space:nowrap;transform:translate(-50%,-135%);display:none;font-variant-numeric:tabular-nums}

  .back{display:inline-flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;
    font:600 13px 'Schibsted Grotesk',system-ui;color:var(--teal);padding:14px 0 0}
  ul.tight{margin:6px 0;padding-left:19px} ul.tight li{margin:4px 0;font-size:13.5px}
  dialog{border:1px solid var(--line);border-radius:14px;background:var(--card);color:var(--ink);padding:20px;max-width:320px;font-family:inherit}
  dialog::backdrop{background:rgba(0,0,0,.4)}
</style>

<div class="wrap">
  <header class="app">
    <div class="brand">
      <div class="lockup">
        <svg width="26" height="26" viewBox="0 0 72 72" aria-hidden="true"><rect width="72" height="72" rx="20" fill="#0E7C74"/><g fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"><path d="M22 22 L38 36 L22 50"/><path d="M36 22 L52 36 L36 50" opacity="0.55"/></g></svg>
        <span class="word">cadence</span>
      </div>
      <div class="streak" id="streakchip"></div>
    </div>
  </header>

  <section class="tab on" id="tab-today"></section>
  <section class="tab" id="tab-train"></section>
  <section class="tab" id="tab-eat"></section>
  <section class="tab" id="tab-trend"></section>
  <section class="tab" id="tab-run"></section>
  <section class="tab" id="tab-shop"></section>
</div>

<nav class="tabs" id="tabs" aria-label="Sections">
  <button data-tab="today" class="on">Today</button>
  <button data-tab="train">Train</button>
  <button data-tab="eat">Eat</button>
  <button data-tab="trend">Trend</button>
</nav>

<dialog id="startdlg">
  <h3 style="margin:0 0 8px;font-size:16px">Program start date</h3>
  <p class="sub">Week 1 begins on this Monday. It drives the run progression, rep targets and checkpoints.</p>
  <input type="date" id="startinput" style="width:100%;padding:10px;border:1px solid var(--line2);border-radius:10px;background:var(--card);color:var(--ink);font-size:14px;font-family:inherit">
  <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end">
    <button class="btn ghost" id="startcancel">Cancel</button>
    <button class="btn" id="startsave">Save</button>
  </div>
</dialog>

<script>
'use strict';
/* ---------------- storage (same key + shapes as v1 — existing data carries over) ---------------- */
const KEY='durham-coach-v1';
const state = load();
function load(){
  try{ const s=JSON.parse(localStorage.getItem(KEY)); if(s&&s.start) return s; }catch(e){}
  return { start:'2026-07-13', primer:{}, done:{}, logs:{}, weights:[], grocery:{week:null,checked:{}} };
}
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }

/* ---------------- dates ---------------- */
function isoOf(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function todayISO(){ return isoOf(new Date()); }
function parseISO(s){ const p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function fmtShort(s){ return parseISO(s).toLocaleDateString(undefined,{month:'short',day:'numeric'}); }
function weekNum(){ const diff=parseISO(todayISO())-parseISO(state.start); return Math.max(0, Math.floor(diff/(7*864e5))+1); }
function daysUntilStart(){ return Math.round((parseISO(state.start)-parseISO(todayISO()))/864e5); }
const DOW = new Date().getDay();

/* ---------------- program data ---------------- */
const PRIMER=[
  {t:'Glute bridges × 15', d:'Hold 2 s at the top — crack a walnut between your cheeks.'},
  {t:'Side-lying band abductions × 12 per side', d:'Lift with the side of the hip, not the thigh. Toe pointed slightly down.'},
  {t:'Dead bugs × 8 per side', d:'Lower back stays glued to the floor, like you’re squashing a grape under it.'},
  {t:'Stomach vacuums 2 × 20 s', d:'Exhale fully, navel to spine. Try to make your waistband fall off.'}
];
const WORKOUTS={
  A:{name:'Glutes + lower', tag:'heavy hinge day', ex:[
    {id:'hipthrust', n:'Hip thrust (barbell or dumbbell)', rx:'4 × 8–12', sets:4, top:12,
     cue:'The rep ends when your <b>glutes finish, not when your back arches</b>. Ribs down, slight pelvic tuck at the top. Shins vertical, drive through heels.'},
    {id:'rdl', n:'Romanian deadlift', rx:'3 × 8–12', sets:3, top:12,
     cue:'<b>Close a car door behind you with your butt.</b> Hinge, don’t squat — knees keep the same soft bend. Stop at a strong hamstring stretch.'},
    {id:'lunge', n:'Walking lunges', rx:'3 × 10 per leg', sets:3, top:0,
     cue:'<b>Long strides + slight forward lean = glutes.</b> Short strides = quads. Push through the front heel.'},
    {id:'kickback', n:'Cable or band kickbacks', rx:'2 × 12–15 per leg', sets:2, top:15,
     cue:'<b>The leg is a lever; the glute does the kicking.</b> If your lower back arches, you kicked too high.'},
    {id:'deadbugA', n:'Dead bug (slow, 3 s lower)', rx:'3 × 10 per side', sets:3, top:0,
     cue:'Lower back pressed into the floor the entire rep.'}
  ]},
  B:{name:'Upper focus', tag:'press + pull', ex:[
    {id:'bench', n:'Dumbbell bench press', rx:'4 × 6–10', sets:4, top:10,
     cue:'<b>Bend the bar in half; elbows at 45°, not chicken wings.</b> Stop one rep before grinding — no spotter.'},
    {id:'row1', n:'One-arm dumbbell row', rx:'4 × 8–12', sets:4, top:12,
     cue:'<b>Row to your hip pocket</b>, start the pull with the shoulder blade, no torso twist.'},
    {id:'ohp', n:'Seated dumbbell shoulder press', rx:'3 × 8–12', sets:3, top:12,
     cue:'<b>Ribs down.</b> If your lower back arches off the bench, the weight is too heavy and your waist goal is paying for it.'},
    {id:'pulldown', n:'Lat pulldown or pull-ups', rx:'3 × 8–12', sets:3, top:12,
     cue:'<b>Elbows to your back pockets.</b> Forearms burning + back not = pulling with your hands. Pull-ups get easy around 165.'},
    {id:'curl', n:'Dumbbell curls', rx:'2 × 12', sets:2, top:12,
     cue:'Elbows pinned to ribs — <b>if they drift forward it’s a front raise, not a curl.</b>'},
    {id:'tri', n:'Overhead triceps extension', rx:'2 × 12', sets:2, top:12,
     cue:'<b>Elbows point at the ceiling and stay there.</b>'},
    {id:'vacB', n:'Stomach vacuums', rx:'3 × 20–30 s', sets:3, top:0, unit:'s',
     cue:'Longer holds today. Best on an empty-ish stomach — post-workout slot works.'}
  ]},
  C:{name:'Full body + glute volume', tag:'round two', ex:[
    {id:'bss', n:'Bulgarian split squat', rx:'3 × 8–10 per leg', sets:3, top:10,
     cue:'<b>The front leg does all the work; the back leg is a kickstand.</b> Hinge slightly forward for glute bias. Railroad tracks, not tightrope.'},
    {id:'trapdl', n:'Trap bar or sumo deadlift', rx:'3 × 6–8', sets:3, top:8,
     cue:'<b>Arms are ropes.</b> Take the slack out, brace like someone’s about to poke your stomach, push the floor away. Film this one weekly.'},
    {id:'incline', n:'Incline dumbbell press', rx:'3 × 8–12', sets:3, top:12,
     cue:'30° incline. Same 45° elbow rule, same stop-before-grinding rule.'},
    {id:'row2', n:'Cable or dumbbell row', rx:'3 × 10–12', sets:3, top:12,
     cue:'Chest tall, <b>shoulder blades start the pull</b>, control the return.'},
    {id:'abd', n:'Seated or banded hip abductions', rx:'3 × 15–20', sets:3, top:20,
     cue:'<b>Pause 1 s at the widest point — the last 2 inches build the upper-glute shelf.</b> Lean slightly forward.'},
    {id:'kneeraise', n:'Hanging knee raises', rx:'3 × 10–15', sets:3, top:15,
     cue:'<b>Tuck the pelvis like a scared dog tucking its tail.</b> Kill the swing between reps. Too hard? Reverse crunches, same pattern.'}
  ]}
};
const TEMPLATE={ // 0=Sun · kind drives the weather swaps
  1:{am:{t:'Strength A — glutes + lower',tab:'train',k:'A',kind:'indoor'}, pm:{t:'Walk 35–45 min',kind:'walk',d:'After 8 PM or indoors. A dusk dog walk counts fully.'}},
  2:{am:{t:'Easy run — done before 8:00 AM',tab:'run',kind:'run'}, pm:{t:'Yoga flow 20 min',kind:'indoor',d:'Post-run hips: downward dog, low lunge, half pigeon, lizard, forward fold.'}},
  3:{am:{t:'Strength B — upper focus',tab:'train',k:'B',kind:'indoor'}, pm:{t:'Walk 35–45 min',kind:'walk',d:'After 8 PM or indoors.'}},
  4:{am:{t:'Run — before 8:00 AM',tab:'run',kind:'run'}, pm:{t:'Mat Pilates 20–25 min',kind:'indoor',d:'The hundred, single/double-leg stretch, criss-cross, side kick series, shoulder bridge, swimming, child’s pose. Exhale on effort, ribs down.'}},
  5:{am:{t:'Strength C — full body + glute volume',tab:'train',k:'C',kind:'indoor'}, pm:{t:'Walk 35–45 min',kind:'walk',d:'After 8 PM or indoors.'}},
  6:{am:{t:'Yoga 30–45 min',kind:'indoor',d:'The real practice — follow a video or class (Yoga With Adriene works). Alternate weeks: longer mat Pilates. Prioritize pigeon, lizard, bridge, boat, side plank.'}, pm:{t:'Optional easy walk',kind:'walk',d:'Zero pressure. Sunday batch cook is tomorrow.'}},
  0:{am:{t:'Rest',d:'Full rest day. Primer still happens — it’s activation, not training.'}, pm:{t:'Easy walk only if you feel like it',kind:'walk',d:'Batch cook for the week: chicken + rice + roasted vegetables = zero-decision lunches Mon–Fri. Boil 6 eggs.'}}
};
function runRx(w){
  if(w<=2)  return {tue:'25 min total — run 2 min / walk 1 min, repeat', thu:'25 min total — run 2 min / walk 1 min, repeat', phase:'Weeks 1–2 · run/walk base'};
  if(w<=4)  return {tue:'30 min total — run 4 min / walk 1 min', thu:'30 min total — run 4 min / walk 1 min', phase:'Weeks 3–4 · run/walk builds'};
  if(w<=8)  return {tue:'30 min continuous, conversational pace', thu:'Quality: 10 min easy · 6 × 1 min hard / 2 min walk · 5 min cooldown', phase:'Weeks 5–8 · continuous + quality'};

/* ---------------- weather (auto from Open-Meteo where fetch is allowed, manual chips as fallback) ---------------- */
const WX_OPTS=[{v:'auto',l:'Auto'},{v:'clear',l:'Clear'},{v:'rain',l:'Rain'},{v:'heat90',l:'HI 90+'},{v:'heat100',l:'HI 100+'}];
const WX_URL='https://api.open-meteo.com/v1/forecast?latitude=35.994&longitude=-78.8986&hourly=apparent_temperature,precipitation_probability&temperature_unit=fahrenheit&timezone=America%2FNew_York&forecast_days=1';
let wxFetchFailed=false;
function wxMode(){ return (state.wx && state.wx.d===todayISO()) ? state.wx.v : 'auto'; }
function wxFresh(){ return state.wxData && state.wxData.day===todayISO() && (Date.now()-state.wxData.t)<60*60*1000; }
function fetchWX(){
  if(wxFresh()||wxFetchFailed) return Promise.resolve(false);
  return fetch(WX_URL).then(r=>r.json()).then(j=>{
    state.wxData={t:Date.now(), day:todayISO(), feels:j.hourly.apparent_temperature, rain:j.hourly.precipitation_probability};
    save(); return true;
  }).catch(()=>{ wxFetchFailed=true; return false; });
}
function slotCond(slot){
  const d=state.wxData; if(!d||d.day!==todayISO()) return null;
  const hrs = slot==='am' ? [6,7] : [20,21];
  const feels=Math.max(...hrs.map(h=>d.feels[h]??-99));
  const rain=Math.max(...hrs.map(h=>d.rain[h]??0));
  const cond = rain>=50 ? 'rain' : feels>=100 ? 'heat100' : feels>=90 ? 'heat90' : 'clear';
  return {feels:Math.round(feels), rain, cond};
}
function wxAdjust(kind, slot){
  if(!kind||kind==='indoor'||kind==='rest') return '';
  const mode=wxMode();
  let cond=mode, why='';
  if(mode==='auto'){
    const c=slotCond(slot); if(!c) return '';
    cond=c.cond; why=` Forecast for the ${slot==='am'?'run window':'evening'}: feels like ${c.feels}°, ${c.rain}% chance of rain.`;
  }
  if(cond==='clear') return '';
  let msg='';
  if(kind==='walk'){
    if(cond==='rain')    msg='Rain — take it inside: 35 min on the treadmill at a 5–10% incline with a podcast does the exact same job.';
    if(cond==='heat90')  msg='Heat index 90+ — hold the walk until after 8 PM, keep it easy, bring water. Treadmill at incline is a full substitute.';
    if(cond==='heat100') msg='Heat index 100+ — treadmill, 35 min at 5–10% incline. Don’t negotiate with this one.';
  }
  if(kind==='run'){
    if(cond==='rain')    msg='Rain — community gym treadmill at 1% incline, exact same session.';
    if(cond==='heat90')  msg='Heat index 90+ — slow 30–60 s per mile or cut the run short. 16 oz water beforehand still applies.';
    if(cond==='heat100') msg='Heat index 100+ — treadmill at 1% incline, full stop. That’s the protocol, not a cop-out.';
  }
  return msg?msg+why:'';
}

const MEAL_PRESETS={b:{n:'Breakfast',c:450,p:45},l:{n:'Lunch box',c:500,p:45},a:{n:'Afternoon',c:300,p:35},d:{n:'Dinner',c:650,p:50}};

function saveFuel(f){ if(!state.fuel) state.fuel={}; state.fuel[todayISO()]=f; save(); }
function fuelTotals(f){
  let c=0,p=0;
  Object.keys(f.meals).forEach(k=>{ if(f.meals[k]&&MEAL_PRESETS[k]){c+=MEAL_PRESETS[k].c;p+=MEAL_PRESETS[k].p;} });
  f.extra.forEach(x=>{c+=x.c;p+=x.p;});
  return {c,p};
}

/* ---------------- derived stats ---------------- */
function dayActive(iso){
  const pr=state.primer[iso], dn=state.done[iso], fu=state.fuel&&state.fuel[iso];
  return (pr&&pr.filter(Boolean).length===4) || (dn&&(dn.am||dn.pm)) || false;
}
function streak(){
  let n=0;
  for(let i=0;i<400;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    const active=dayActive(isoOf(d));
    if(active) n++;
    else if(i===0) continue;      // an unfinished today doesn't break the streak
    else break;
  }
  return n;
}
function avgWindow(days, endOffset){
  const now=parseISO(todayISO()).getTime();
  const from=now-(endOffset+days)*864e5, to=now-endOffset*864e5;
  const pts=state.weights.filter(p=>{const t=parseISO(p.d).getTime(); return t>from&&t<=to;});
  if(!pts.length) return null;
  return pts.reduce((a,p)=>a+p.w,0)/pts.length;
}
function weeklyRate(){
  const a=avgWindow(7,0), b=avgWindow(7,7);
  return (a!=null&&b!=null)?(b-a):null;
}
function currentWeight(){
  const ws=[...state.weights].sort((a,b)=>a.d<b.d?-1:1);
  return ws.length?ws[ws.length-1]:null;
}
function estGoalDate(){
  const r=weeklyRate(), a=avgWindow(7,0);
  if(r==null||a==null||r<0.3||a<=160) return null;
  const days=(a-160)/r*7;
  if(days>420) return null;
  const d=new Date(); d.setDate(d.getDate()+Math.round(days));
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
}
function weeklyAvgs(){ // avg weight per program week, last 8 with data
  const buckets={};
  state.weights.forEach(p=>{
    const wk=Math.floor((parseISO(p.d)-parseISO(state.start))/(7*864e5));
    (buckets[wk]=buckets[wk]||[]).push(p.w);
  });
  return Object.keys(buckets).map(Number).sort((a,b)=>a-b)
    .map(wk=>({wk, avg:buckets[wk].reduce((a,b)=>a+b,0)/buckets[wk].length})).slice(-8);
}

  let arr=state.logs[exId]||(state.logs[exId]=[]);
  let entry=arr.find(e=>e.d===todayISO());
  if(!entry){ entry={d:todayISO(),s:[]}; arr.push(entry); }
  while(entry.s.length<=idx) entry.s.push({w:'',r:''});
  entry.s[idx][field]=val;
  if(entry.s.every(s=>s.w===''&&s.r==='')) arr.splice(arr.indexOf(entry),1);
  save();
}

/* chart inside the dark hero card — single mint series, goal band, hover crosshair */
function drawChart(){
  const box=document.getElementById('chartbox'); if(!box) return;
  const ws=[...state.weights].sort((a,b)=>a.d<b.d?-1:1);
  const W=520,H=190,L=34,R=10,T=10,B=22;
  if(ws.length<1){
    box.innerHTML='<p style="padding:20px 4px;text-align:center;color:var(--hero-sub);font-size:12.5px;margin:0">Log your first weigh-in above — the trend and the weekly rate build from it.</p>';
    return;
  }
  const t0=parseISO(ws[0].d).getTime();
  const t1=Math.max(parseISO(ws[ws.length-1].d).getTime(), t0+14*864e5);
  const vals=ws.map(p=>p.w);
  const yMax=Math.max(...vals,181)+1, yMin=Math.min(...vals,155)-2;
  const X=t=>L+(t-t0)/(t1-t0)*(W-L-R);
  const Y=v=>T+(yMax-v)/(yMax-yMin)*(H-T-B);
  let g='';
  g+=`<rect x="${L}" y="${Y(162)}" width="${W-L-R}" height="${Y(155)-Y(162)}" fill="rgba(95,211,198,.12)"/>`;
  g+=`<text x="${W-R-4}" y="${Y(162)+12}" text-anchor="end" font-size="9" fill="#5FD3C6" font-weight="700">GOAL 155–162</text>`;
  for(let v=Math.ceil(yMin/5)*5; v<=yMax; v+=5){
    g+=`<line x1="${L}" x2="${W-R}" y1="${Y(v)}" y2="${Y(v)}" stroke="#2B2E31" stroke-width="1"/>`;
    g+=`<text x="${L-6}" y="${Y(v)+3}" text-anchor="end" font-size="9" fill="#6C7379" style="font-variant-numeric:tabular-nums">${v}</text>`;
  }
  const span=t1-t0, n=Math.min(4,Math.max(1,ws.length));
  for(let i=0;i<=n;i++){
    const t=t0+span*i/n, d=new Date(t);
    g+=`<text x="${X(t)}" y="${H-6}" text-anchor="middle" font-size="9" fill="#6C7379">${d.toLocaleDateString(undefined,{month:'short',day:'numeric'})}</text>`;
  }
  g+=`<line x1="${L}" x2="${W-R}" y1="${Y(180)}" y2="${Y(180)}" stroke="#3A3E42" stroke-width="1" stroke-dasharray="3 4"/>`;
  const pts=ws.map(p=>[X(parseISO(p.d).getTime()),Y(p.w)]);
  if(pts.length>1) g+=`<path d="M${pts.map(p=>p[0].toFixed(1)+' '+p[1].toFixed(1)).join('L')}" fill="none" stroke="#5FD3C6" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
  pts.forEach((p,i)=>{ if(i<pts.length-1) g+=`<circle cx="${p[0]}" cy="${p[1]}" r="2.3" fill="#5FD3C6"/>`; });
  const lp=pts[pts.length-1];
  g+=`<circle cx="${lp[0]}" cy="${lp[1]}" r="4.5" fill="#5FD3C6" stroke="#16181A" stroke-width="2"/>`;
  g+=`<line id="xh" x1="0" x2="0" y1="${T}" y2="${H-B}" stroke="#4A4E52" stroke-width="1" visibility="hidden"/>`;
  box.innerHTML=`<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Weight trend from ${ws[0].w} to ${ws[ws.length-1].w} pounds">${g}</svg><div class="tip"></div>`;
  const svg=box.querySelector('svg'), xh=svg.querySelector('#xh'), tip=box.querySelector('.tip');
  function onmove(ev){
    const r=svg.getBoundingClientRect();
    const cx=ev.touches?ev.touches[0].clientX:ev.clientX;
    const mx=(cx-r.left)/r.width*W;
    let best=0,bd=1e9;
    pts.forEach((p,i)=>{const d=Math.abs(p[0]-mx); if(d<bd){bd=d;best=i;}});
    const p=pts[best];
    xh.setAttribute('x1',p[0]); xh.setAttribute('x2',p[0]); xh.setAttribute('visibility','visible');
    tip.style.display='block';
    tip.style.left=(p[0]/W*100)+'%';
    tip.style.top=(p[1]/H*100)+'%';
    tip.textContent=fmtShort(ws[best].d)+' · '+ws[best].w.toFixed(1)+' lb';
  }
  svg.addEventListener('mousemove',onmove);
  svg.addEventListener('touchstart',onmove,{passive:true});
  svg.addEventListener('touchmove',onmove,{passive:true});
  svg.addEventListener('mouseleave',()=>{tip.style.display='none';xh.setAttribute('visibility','hidden');});
}

/* ---------------- events (delegated) ---------------- */
function refreshFuelViews(){ renderEat(); renderToday(); renderHeader(); }
document.addEventListener('click',e=>{
  const wxb=e.target.closest('[data-wx]');
  if(wxb){ state.wx={d:todayISO(),v:wxb.dataset.wx}; save(); renderToday(); return; }
  const db=e.target.closest('[data-done]');
  if(db){ const iso=todayISO(); const d=state.done[iso]||(state.done[iso]={}); d[db.dataset.done]=!d[db.dataset.done]; save(); renderToday(); renderHeader(); return; }
  const pb=e.target.closest('[data-primer]');
  if(pb){ const iso=todayISO(); const pr=state.primer[iso]||(state.primer[iso]=[false,false,false,false]); pr[+pb.dataset.primer]=!pr[+pb.dataset.primer]; save(); renderToday(); renderHeader(); return; }
  const wb=e.target.closest('[data-water]');
  if(wb){ const f=fuelToday(); f.w=Math.max(0,f.w + +wb.dataset.water); saveFuel(f); refreshFuelViews(); return; }
  const mb=e.target.closest('[data-meal]');
  if(mb){ const f=fuelToday(); f.meals[mb.dataset.meal]=!f.meals[mb.dataset.meal]; saveFuel(f); refreshFuelViews(); return; }
  if(e.target.closest('[data-addfood]')){
    const c=Math.round(+document.getElementById('fc').value)||0, p=Math.round(+document.getElementById('fp').value)||0;
    if(c>0||p>0){ const f=fuelToday(); f.extra.push({c,p}); saveFuel(f); refreshFuelViews(); }
    return;
  }
  const xb=e.target.closest('[data-delextra]');
  if(xb){ const f=fuelToday(); f.extra.splice(+xb.dataset.delextra,1); saveFuel(f); refreshFuelViews(); return; }
  const go=e.target.closest('[data-go]');
  if(go){ if(go.dataset.day){ currentDay=go.dataset.day; renderTrain(); } showTab(go.dataset.go); return; }
  const dk=e.target.closest('[data-dayk]');
  if(dk){ currentDay=dk.dataset.dayk; renderTrain(); }
});
document.addEventListener('change',e=>{
  const t=e.target;
  if(t.dataset.gro){ state.grocery.checked[t.dataset.gro]=t.checked; save(); renderShop(); renderEat(); }
});
document.addEventListener('input',e=>{
  const t=e.target;
  if(t.dataset.ex) saveSet(t.dataset.ex,+t.dataset.set,t.dataset.f,t.value);
});

/* ---------------- boot ---------------- */
function renderAll(){ renderHeader(); renderToday(); renderTrain(); renderRun(); renderEat(); renderShop(); renderTrend(); }
renderAll();
</script>
