<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cadence — 180 to 160</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72"><rect width="72" height="72" rx="20" fill="%230E7C74"/><g fill="none" stroke="%23fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"><path d="M22 22 L38 36 L22 50"/><path d="M36 22 L52 36 L36 50" opacity=".55"/></g></svg>'>
<link rel="mask-icon" href="favicon-mask.svg" color="#0E7C74">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0E7C74">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --canvas:#FBFBFA; --card:#ffffff; --line:#EDEEEF; --line2:#E2E4E5;
    --ink:#16181A; --sub:#8A9096; --mut:#A2A7AC;
    --teal:#0E7C74; --teal-hi:#12A093; --teal-deep:#0E5C56; --chip:#E4F1EF; --mint:#5FD3C6;
    --hero:#16181A; --hero-ink:#ffffff; --hero-sub:#8F979E; --hero-track:#2B2E31;
    --track:#EBECED; --warn:#B26A00; --crit:#C23434;
    --shadow:0 1px 2px rgba(16,24,26,.05),0 12px 28px -18px rgba(16,24,26,.25);
    --shadow-sm:0 1px 2px rgba(16,24,26,.04);
  }
  /* the Cadence design commits to one theme: light canvas, dark hero cards —
     tokens stay identical in dark mode and under the viewer's theme toggle */
  :root[data-theme="dark"], :root[data-theme="light"]{
    --canvas:#FBFBFA; --card:#ffffff; --ink:#16181A;
  }
  :root{ color-scheme: light; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--canvas);color:var(--ink);
    font:15px/1.5 'Schibsted Grotesk',-apple-system,'Segoe UI',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:560px;margin:0 auto;padding:0 18px 100px}

  @keyframes fadeSlide{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,14px)}to{opacity:1;transform:translate(-50%,0)}}
  @keyframes ringGrow{from{stroke-dashoffset:var(--circ)}to{stroke-dashoffset:var(--off)}}
  @keyframes drawLine{to{stroke-dashoffset:0}}
  section.tab.on{animation:fadeSlide .35s ease both}
  .au{animation:fadeUp .45s ease both}
  @media(prefers-reduced-motion:reduce){
    section.tab.on,.au,.toast{animation:none !important}
    .ringfg{animation:none !important;stroke-dashoffset:var(--off) !important}
    .trendline{animation:none !important;stroke-dashoffset:0 !important}
    .meter i,.hbar i{transition:none}
  }

  header.app{position:sticky;top:0;z-index:20;background:var(--canvas);margin:0 -18px;padding:16px 18px 12px;border-bottom:1px solid var(--line)}
  .brand{display:flex;justify-content:space-between;align-items:center}
  .lockup{display:flex;align-items:center;gap:9px}
  .lockup .word{font-weight:800;font-size:17px;letter-spacing:-.03em}
  .streak{display:flex;align-items:center;gap:6px;background:var(--chip);padding:5px 11px;border-radius:20px;
    font-weight:700;font-size:12px;color:var(--teal);font-variant-numeric:tabular-nums}
  .streak .dot{width:6px;height:6px;border-radius:50%;background:var(--teal)}

  nav.tabs{position:fixed;bottom:0;left:0;right:0;z-index:30;background:var(--card);border-top:1px solid var(--line);
    display:flex;justify-content:space-around;padding:10px 8px calc(10px + env(safe-area-inset-bottom))}
  nav.tabs button{background:none;border:none;cursor:pointer;color:var(--mut);padding:2px 12px;
    display:flex;flex-direction:column;align-items:center;gap:4px;font:700 10px 'Schibsted Grotesk',system-ui;transition:transform .12s}
  nav.tabs button:active{transform:scale(.9)}
  nav.tabs button.on{color:var(--teal)}
  nav.tabs button:focus-visible{outline:2px solid var(--teal);outline-offset:2px;border-radius:8px}

  section.tab{display:none}
  section.tab.on{display:block}

  .eyebrow{font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);margin:20px 0 9px;display:flex;justify-content:space-between;align-items:baseline;gap:14px}
  .eyebrow .note{text-align:right;flex:1;text-transform:none;letter-spacing:0;font-weight:500}
  .eyebrow a,.eyebrow button{font:600 11px 'Schibsted Grotesk',system-ui;color:var(--teal);background:none;border:none;cursor:pointer;padding:0;letter-spacing:.02em;text-transform:none;text-decoration:none}

  .hero{background:var(--hero);border-radius:20px;padding:18px 19px;color:var(--hero-ink);margin:6px 0 12px}
  .hero .hsub{color:var(--hero-sub);font-size:11px;font-weight:600;letter-spacing:.04em}
  .hero .big{font-weight:800;font-size:40px;line-height:.95;letter-spacing:-.02em}
  .hero .mint{color:var(--mint)}
  .hbar{height:6px;background:var(--hero-track);border-radius:4px;overflow:hidden}
  .hbar i{display:block;height:100%;background:var(--mint);border-radius:4px;transition:width .25s ease}

  .wcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin:9px 0;box-shadow:var(--shadow-sm)}
  .wcard h3{margin:0;font-size:15px;font-weight:700}
  .sub{color:var(--sub);font-size:13px;margin:3px 0}
  .fine{color:var(--mut);font-size:12.5px}
  .cue{color:var(--sub);font-size:13px;font-style:italic;margin:5px 0 0}
  .cue b{color:var(--teal);font-style:normal;font-weight:700}
  .num{font-variant-numeric:tabular-nums;white-space:nowrap}

  .bignum{font-weight:800;font-size:54px;line-height:.85;letter-spacing:-.035em;font-variant-numeric:tabular-nums}
  .bignum small{font-size:22px;color:var(--mut);letter-spacing:0;font-weight:800}
  .deltachip{display:inline-flex;align-items:center;gap:6px;background:var(--chip);padding:5px 10px;border-radius:8px;
    font-weight:700;font-size:12px;color:var(--teal);margin-top:10px}

  .plan{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--line2);border-radius:16px;padding:14px 15px;margin:10px 0;display:flex;gap:13px;align-items:flex-start;box-shadow:var(--shadow)}
  .plan.hot{border-left-color:var(--teal)}
  .plan .t{font-weight:700;font-size:15.5px;line-height:1.1}
  .plan .d{font-weight:500;font-size:12px;color:var(--sub);margin-top:3px}
  .plan.donetext .t{color:var(--mut);text-decoration:line-through}

  .ring{width:26px;height:26px;border-radius:50%;border:2px solid var(--line2);background:none;cursor:pointer;flex:none;margin-top:2px;
    display:flex;align-items:center;justify-content:center;font:700 13px 'Schibsted Grotesk';color:transparent;padding:0}
  .ring.on{background:var(--teal);border-color:var(--teal);color:#fff}
  .ring:focus-visible{outline:2px solid var(--teal);outline-offset:2px}

  .btn{background:var(--teal);color:#fff;border:none;border-radius:10px;padding:9px 15px;font:700 12.5px 'Schibsted Grotesk',system-ui;cursor:pointer;transition:transform .12s}
  .btn:active{transform:scale(.96)}
  .btn.ghost{background:none;border:1px solid var(--line2);color:var(--sub)}
  .btn.chipbtn{background:var(--chip);color:var(--teal)}
  .btn.wide{display:block;width:100%;padding:14px 0;font-size:15px;border-radius:12px}
  .btn:focus-visible{outline:2px solid var(--teal);outline-offset:2px}

  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chips button{background:var(--card);border:1px solid var(--line2);border-radius:20px;padding:6px 12px;
    font:600 12px 'Schibsted Grotesk',system-ui;color:var(--sub);cursor:pointer}
  .chips button.on{background:var(--teal);border-color:var(--teal);color:#fff}

  .qa{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
  .qa button{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 6px;text-align:center;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .12s}
  .qa button:active{transform:scale(.95)}
  .qa .qn{font-weight:700;font-size:13px;color:var(--ink)}
  .qa .qv{font-weight:600;font-size:11px;color:var(--teal);margin-top:3px}

  .wxnote{border-left:3px solid var(--warn);background:var(--chip);border-radius:0 9px 9px 0;padding:8px 12px;margin-top:9px;font-size:12.5px}
  .callout{border-left:3px solid var(--teal);background:var(--chip);border-radius:0 10px 10px 0;padding:10px 14px;margin:10px 0;font-size:13px}
  .callout.warn{border-left-color:var(--warn)}
  .callout.crit{border-left-color:var(--crit)}

  .meter{height:6px;background:var(--track);border-radius:4px;overflow:hidden}
  .meter i{display:block;height:100%;background:var(--teal);border-radius:4px;transition:width .25s ease}
  .meter i.ink{background:var(--ink)}

  .curcard{background:var(--card);border:2px solid var(--teal);border-radius:18px;padding:16px;margin:12px 0;box-shadow:0 8px 28px -14px rgba(14,124,116,.5)}
  .setrow{display:flex;gap:8px;margin-top:13px}
  .setcell{flex:1;text-align:center;border-radius:11px;padding:12px 0;font:800 15px 'Schibsted Grotesk';background:var(--track);color:var(--mut);transition:all .25s}
  .setcell.done{background:var(--teal);color:#fff}
  .setcell.cur{background:var(--ink);color:var(--canvas)}
  .loginputs{display:flex;gap:8px;align-items:center;margin-top:13px}
  .loginputs input{flex:1;min-width:0;border:1px solid var(--line2);background:var(--card);color:var(--ink);border-radius:10px;
    padding:11px 6px;font:700 16px 'Schibsted Grotesk',system-ui;text-align:center;font-variant-numeric:tabular-nums}
  .loginputs input:focus-visible{outline:2px solid var(--teal)}
  .restbox{margin-top:13px;background:var(--chip);border-radius:12px;padding:12px 14px}
  .restbar{margin-top:9px;height:5px;background:var(--track);border-radius:3px;overflow:hidden}
  .restbar i{display:block;height:100%;background:var(--teal);border-radius:3px;transition:width 1s linear}
  .exrow{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin:9px 0;box-shadow:var(--shadow-sm);cursor:pointer}
  .exrow.done{opacity:.6}
  .exrow .top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .exrow .nm{font-weight:700;font-size:15px}
  .rx{color:var(--teal);font-size:12.5px;font-weight:600;white-space:nowrap;font-variant-numeric:tabular-nums}
  .guide{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;font-size:13px}
  .guide .gl{font-weight:700;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--teal);margin:8px 0 2px}
  .guide .gl:first-child{margin-top:0}
  .guide p{margin:0;color:var(--sub)}
  .pill{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;border-radius:7px;padding:3px 8px}
  .pill.now{background:var(--teal);color:#fff}
  .pill.hint{background:var(--chip);color:var(--teal)}
  .last{font-size:12px;color:var(--mut);margin-top:5px;font-variant-numeric:tabular-nums}

  table.plain{width:100%;border-collapse:collapse;font-size:13.5px}
  table.plain td{padding:7px 8px 7px 0;border-bottom:1px solid var(--line);vertical-align:top}
  table.plain tr:last-child td{border-bottom:none}
  .scrollx{overflow-x:auto}

  .groitem{display:flex;align-items:center;gap:11px;padding:8px 0;border-bottom:1px solid var(--line);cursor:pointer}
  .groitem:last-child{border-bottom:none}
  .groitem input{width:19px;height:19px;accent-color:var(--teal);flex:none;cursor:pointer}
  .groitem .n{flex:1;font-weight:600;font-size:13.5px}
  .groitem.got .n{color:var(--mut);text-decoration:line-through}
  .groitem .q{color:var(--sub);font-size:12px}
  .groitem .p{color:var(--mut);font-size:12px;font-variant-numeric:tabular-nums;width:36px;text-align:right}

  .milestone{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin:8px 0;box-shadow:var(--shadow-sm)}
  .milestone.next{border:2px solid var(--teal);box-shadow:0 8px 24px -16px rgba(14,124,116,.5)}
  .milestone.todo{opacity:.6}
  .mk{width:22px;height:22px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font:700 12px 'Schibsted Grotesk'}
  .milestone.done .mk{background:var(--teal);color:#fff}
  .milestone.next .mk{border:2px solid var(--teal);color:var(--teal);font-size:11px}
  .milestone.todo .mk{border:2px solid var(--line2)}

  .weightform{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .weightform input[type=number]{width:104px;font-size:20px;font-weight:800;padding:9px;border:1px solid var(--line2);
    border-radius:10px;background:var(--card);color:var(--ink);font-variant-numeric:tabular-nums;text-align:center}
  .weightform input[type=date]{padding:10px;border:1px solid var(--line2);border-radius:10px;background:var(--card);color:var(--ink);font-size:13px;font-family:inherit}

  .chartbox{position:relative}
  .chartbox svg{display:block;width:100%;height:auto}
  .tip{position:absolute;pointer-events:none;background:var(--mint);color:#16181A;border-radius:6px;
    padding:4px 9px;font-size:12px;font-weight:700;white-space:nowrap;transform:translate(-50%,-135%);display:none;font-variant-numeric:tabular-nums}

  .back{display:inline-flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;
    font:600 13px 'Schibsted Grotesk',system-ui;color:var(--teal);padding:14px 0 0}
  ul.tight{margin:6px 0;padding-left:19px} ul.tight li{margin:4px 0;font-size:13.5px}

  .toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%);background:var(--ink);color:var(--canvas);
    padding:11px 18px;border-radius:24px;font:700 13px 'Schibsted Grotesk';box-shadow:0 12px 30px -10px rgba(0,0,0,.4);
    white-space:nowrap;z-index:50;display:none;animation:toastIn .3s ease both}
  .toast.on{display:block}

  .runstats{display:flex;gap:24px;margin-top:6px}
  .runstats .v{font-weight:800;font-size:26px;line-height:1;font-variant-numeric:tabular-nums}
  .runstats .l{font-weight:600;font-size:10px;letter-spacing:.05em;color:var(--mut);text-transform:uppercase;margin-top:5px}
  #runmap{height:220px;border-radius:14px;overflow:hidden;margin-top:12px;background:var(--track)}
  #runmap svg{display:block;width:100%;height:100%}
  .timerbig{font-weight:800;font-size:52px;line-height:.9;letter-spacing:-.03em;font-variant-numeric:tabular-nums;text-align:center}
  .timerseg{text-align:center;font-weight:700;font-size:15px;margin-top:8px}
  .timernext{text-align:center;font-size:12px;color:var(--sub);margin-top:4px}
  .runrow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}
  .runrow:last-child{border-bottom:none}
  .searchrow{display:flex;gap:8px;margin-top:10px}
  .searchrow input{flex:1;min-width:0;border:1px solid var(--line2);background:var(--card);color:var(--ink);border-radius:10px;
    padding:10px 12px;font:600 14px 'Schibsted Grotesk',system-ui}
  .searchrow input:focus-visible{outline:2px solid var(--teal)}
  .offresult{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}
  .offresult:last-child{border-bottom:none}
  #scanvideo{width:100%;border-radius:12px;margin-top:10px;display:none;background:#000}
  dialog{border:1px solid var(--line);border-radius:14px;background:var(--card);color:var(--ink);padding:20px;max-width:320px;font-family:inherit}
  dialog::backdrop{background:rgba(0,0,0,.4)}
</style>

<div class="wrap">
  <header class="app">
    <div class="brand">
      <div class="lockup">
        <svg width="28" height="28" viewBox="0 0 72 72" aria-hidden="true"><rect width="72" height="72" rx="20" fill="#0E7C74"/><g fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"><path d="M22 22 L38 36 L22 50"/><path d="M36 22 L52 36 L36 50" opacity="0.55"/></g></svg>
        <span class="word">cadence</span>
      </div>
      <div class="streak" id="streakchip"></div>
    </div>
  </header>

  <section class="tab on" id="tab-today"></section>
  <section class="tab" id="tab-train"></section>
  <section class="tab" id="tab-eat"></section>
  <section class="tab" id="tab-trend"></section>
  <section class="tab" id="tab-run"></section>
  <section class="tab" id="tab-shop"></section>
</div>

<div class="toast" id="toast" role="status"></div>

<nav class="tabs" id="tabs" aria-label="Sections">
  <button data-tab="today" class="on"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2-6 4 12 2-6h6"/></svg>Today</button>
  <button data-tab="train"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6M7 8v8M17 8v8M20 9v6M7 12h10"/></svg>Train</button>
  <button data-tab="eat"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v6a2 2 0 0 0 4 0V3M8 9v12M16 21V3c-2 1-2 7 0 8"/></svg>Eat</button>
  <button data-tab="trend"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V6M4 20h16M8 15l3-4 3 2 4-6"/></svg>Trend</button>
</nav>

<dialog id="startdlg">
  <h3 style="margin:0 0 8px;font-size:16px">Program start date</h3>
  <p class="sub">Week 1 begins on this Monday. It drives the run progression, rep targets and checkpoints.</p>
  <input type="date" id="startinput" style="width:100%;padding:10px;border:1px solid var(--line2);border-radius:10px;background:var(--card);color:var(--ink);font-size:14px;font-family:inherit">
  <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end">
    <button class="btn ghost" id="startcancel">Cancel</button>
    <button class="btn" id="startsave">Save</button>
  </div>
</dialog>

<script>
'use strict';
/* ---------------- storage (same key + shapes since v1 — data carries over) ---------------- */
const KEY='durham-coach-v1';
const state = load();
function load(){
  try{ const s=JSON.parse(localStorage.getItem(KEY)); if(s&&s.start) return s; }catch(e){}
  return { start:'2026-07-13', primer:{}, done:{}, logs:{}, weights:[], grocery:{week:null,checked:{}} };
}
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }
const REDUCED = matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ---------------- dates ---------------- */
function isoOf(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function todayISO(){ return isoOf(new Date()); }
function parseISO(s){ const p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function fmtShort(s){ return parseISO(s).toLocaleDateString(undefined,{month:'short',day:'numeric'}); }
function weekNum(){ const diff=parseISO(todayISO())-parseISO(state.start); return Math.max(0, Math.floor(diff/(7*864e5))+1); }
function daysUntilStart(){ return Math.round((parseISO(state.start)-parseISO(todayISO()))/864e5); }
const DOW = new Date().getDay();

/* ---------------- program data ---------------- */
const PRIMER=[
  {t:'Glute bridges × 15', d:'Hold 2 s at the top — crack a walnut between your cheeks.'},
  {t:'Side-lying band abductions × 12 per side', d:'Lift with the side of the hip, not the thigh. Toe pointed slightly down.'},
  {t:'Dead bugs × 8 per side', d:'Lower back stays glued to the floor, like you’re squashing a grape under it.'},
  {t:'Stomach vacuums 2 × 20 s', d:'Exhale fully, navel to spine. Try to make your waistband fall off.'}
];
const WORKOUTS={
  A:{name:'Glutes + lower', ex:[
    {id:'hipthrust', n:'Hip thrust (barbell or dumbbell)', rx:'4 × 8–12', sets:4, top:12,
     cue:'The rep ends when your <b>glutes finish, not when your back arches</b>. Ribs down, slight pelvic tuck at the top.'},
    {id:'rdl', n:'Romanian deadlift', rx:'3 × 8–12', sets:3, top:12,
     cue:'<b>Close a car door behind you with your butt.</b>'},
    {id:'lunge', n:'Walking lunges', rx:'3 × 10 per leg', sets:3, top:0,
     cue:'<b>Long strides + slight forward lean = glutes.</b> Short strides = quads.'},
    {id:'kickback', n:'Cable or band kickbacks', rx:'2 × 12–15 per leg', sets:2, top:15,
     cue:'<b>The leg is a lever; the glute does the kicking.</b>'},
    {id:'deadbugA', n:'Dead bug (slow, 3 s lower)', rx:'3 × 10 per side', sets:3, top:0,
     cue:'Lower back pressed into the floor the entire rep.'}

const WX_OPTS=[{v:'auto',l:'Auto'},{v:'clear',l:'Clear'},{v:'rain',l:'Rain'},{v:'heat90',l:'HI 90+'},{v:'heat100',l:'HI 100+'}];
const WX_URL='https://api.open-meteo.com/v1/forecast?latitude=35.994&longitude=-78.8986&hourly=apparent_temperature,precipitation_probability&temperature_unit=fahrenheit&timezone=America%2FNew_York&forecast_days=1';
let wxFetchFailed=false;
function wxMode(){ return (state.wx && state.wx.d===todayISO()) ? state.wx.v : 'auto'; }
function wxFresh(){ return state.wxData && state.wxData.day===todayISO() && (Date.now()-state.wxData.t)<60*60*1000; }
function fetchWX(){
  if(wxFresh()||wxFetchFailed) return Promise.resolve(false);
  return fetch(WX_URL).then(r=>r.json()).then(j=>{
    state.wxData={t:Date.now(), day:todayISO(), feels:j.hourly.apparent_temperature, rain:j.hourly.precipitation_probability};
    save(); return true;
  }).catch(()=>{ wxFetchFailed=true; return false; });
}
function slotCond(slot){ // 'am' = the pre-8AM run window, 'pm' = the post-8PM walk window
  const d=state.wxData; if(!d||d.day!==todayISO()) return null;
  const hrs = slot==='am' ? [6,7] : [20,21];
  const feels=Math.max(...hrs.map(h=>d.feels[h]??-99));
  const rain=Math.max(...hrs.map(h=>d.rain[h]??0));
  const cond = rain>=50 ? 'rain' : feels>=100 ? 'heat100' : feels>=90 ? 'heat90' : 'clear';
  return {feels:Math.round(feels), rain, cond};
}
function wxAdjust(kind, slot){
  if(!kind||kind==='indoor'||kind==='rest') return '';
  const mode=wxMode();
  let cond=mode, why='';
  if(mode==='auto'){
    const c=slotCond(slot); if(!c) return '';
    cond=c.cond; why=` Forecast for the ${slot==='am'?'run window':'evening'}: feels like ${c.feels}°, ${c.rain}% chance of rain.`;
  }
  if(cond==='clear') return '';
  let msg='';
  if(kind==='walk'){
    if(cond==='rain')    msg='Rain — take it inside: 35 min on the treadmill at a 5–10% incline with a podcast does the exact same job.';
    if(cond==='heat90')  msg='Heat index 90+ — hold the walk until after 8 PM, keep it easy, bring water. Treadmill at incline is a full substitute.';
    if(cond==='heat100') msg='Heat index 100+ — treadmill, 35 min at 5–10% incline. Don’t negotiate with this one.';
  }
  if(kind==='run'){
    if(cond==='rain')    msg='Rain — community gym treadmill at 1% incline, exact same session.';
    if(cond==='heat90')  msg='Heat index 90+ — slow 30–60 s per mile or cut the run short. 16 oz water beforehand still applies.';
    if(cond==='heat100') msg='Heat index 100+ — treadmill at 1% incline, full stop. That’s the protocol, not a cop-out.';
  }
  return msg?msg+why:'';
}

function dayActive(iso){

function streak(){
  let n=0;
  for(let i=0;i<400;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    if(dayActive(isoOf(d))) n++;
    else if(i===0) continue;
    else break;
  }
  return n;
}
function avgWindow(days, endOffset){
  const now=parseISO(todayISO()).getTime();
  const from=now-(endOffset+days)*864e5, to=now-endOffset*864e5;
  const pts=state.weights.filter(p=>{const t=parseISO(p.d).getTime(); return t>from&&t<=to;});
  if(!pts.length) return null;
  return pts.reduce((a,p)=>a+p.w,0)/pts.length;
}
function weeklyRate(){ const a=avgWindow(7,0), b=avgWindow(7,7); return (a!=null&&b!=null)?(b-a):null; }
function currentWeight(){
  const ws=[...state.weights].sort((a,b)=>a.d<b.d?-1:1);
  return ws.length?ws[ws.length-1]:null;
}
function estGoalDate(){
  const r=weeklyRate(), a=avgWindow(7,0);
  if(r==null||a==null||r<0.3||a<=160) return null;
  const days=(a-160)/r*7;
  if(days>420) return null;
  const d=new Date(); d.setDate(d.getDate()+Math.round(days));
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
}

/* ---------------- TRAIN (guided flow) ---------------- */
let currentDay = ({1:'A',3:'B',5:'C'})[DOW] || 'A';
let overrideEx=null;                 // manually chosen current exercise id

function lastLog(exId){
  const arr=(state.logs[exId]||[]).filter(e=>e.d!==todayISO());
  return arr.length?arr[arr.length-1]:null;
}
function todayLog(exId){
  return (state.logs[exId]||[]).find(e=>e.d===todayISO())||null;
}
function loggedSets(ex){ const e=todayLog(ex.id); return e?e.s.filter(s=>s.w!==''||s.r!=='').length:0; }
function exDone(ex){ return loggedSets(ex)>=ex.sets; }
function sessInfo(){
  if(state.sess && state.sess.d===todayISO()) return state.sess;
  return null;
}
function guideBlock(ex){
  const g=GUIDE[ex.id]; if(!g) return '';
  return `<div class="guide">
    <div class="gl">Setup</div><p>${g.s}</p>
    <div class="gl">Execution</div><p>${g.e}</p>
    <div class="gl">Money cue</div><p class="cue" style="margin:0">${ex.cue}</p>
    <div class="gl">Watch for</div><p>${g.m}</p>

}
function renderTrain(){

    <div class="hero au" style="margin-top:12px;animation-delay:.06s">
      <div class="big" style="font-size:24px">${W.name}</div>
      <div style="margin-top:14px;display:flex;gap:24px">
        <div><div style="font-weight:800;font-size:21px" class="num">${doneCount}<span style="color:var(--hero-sub);font-size:13px">/${W.ex.length}</span></div><div class="hsub" style="font-size:10px;margin-top:5px">LIFTS DONE</div></div>

      </div>

    <p class="fine au" style="animation-delay:.08s">${wk<=2?'Weeks 1–2: leave 3–4 reps in the tank on everything.':'1–2 reps in reserve on the final set. Top of the range on all sets → add weight next session.'} Rest 90 s–2 min compounds, 60–90 s accessories. Brace every rep: ribs down, navel in, exhale on effort.</p>

function commitSet(exId){
  const W=WORKOUTS[currentDay], ex=W.ex.find(x=>x.id===exId); if(!ex) return;
  const r=document.getElementById('cr')?document.getElementById('cr').value.trim():'';
  const w=document.getElementById('cw')?document.getElementById('cw').value.trim():'';
  if(r===''&&w===''){ showToast('Enter the set first'); return; }
  let arr=state.logs[exId]||(state.logs[exId]=[]);
  let entry=arr.find(e=>e.d===todayISO());
  if(!entry){ entry={d:todayISO(),s:[]}; arr.push(entry); }
  entry.s.push({w,r});
  if(!state.sess||state.sess.d!==todayISO()) state.sess={d:todayISO(),t0:Date.now()};
  save();
  if(loggedSets(ex)>=ex.sets){ overrideEx=null; showToast(ex.n+' done'); }
  else { restEnd=Date.now()+90*1000; }
  renderTrain(); renderHeader();
}
function tickRest(){
  clearInterval(restTimer);
  if(restEnd<=Date.now()) return;
  restTimer=setInterval(()=>{
    const left=Math.max(0,restEnd-Date.now());
    const el=document.getElementById('resttime'), bar=document.getElementById('restbar');
    if(!el){ clearInterval(restTimer); return; }
    const s=Math.ceil(left/1000);
    el.textContent=Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
    if(bar) bar.style.width=(left/900)+'%';
    if(left<=0){ clearInterval(restTimer); restEnd=0; renderTrain(); }
  },250);
}
let elapsedTimer=null;
function tickElapsed(){
  clearInterval(elapsedTimer);
  const sess=sessInfo(); if(!sess) return;
  const upd=()=>{
    const el=document.getElementById('elapsed'); if(!el) return;
    const s=Math.floor((Date.now()-sess.t0)/1000);
    el.textContent=Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
  };
  upd(); elapsedTimer=setInterval(upd,1000);
}

/* ---------------- RUN: GPS tracker, interval timer, history ---------------- */
function fmtDur(s){ s=Math.round(s); const h=Math.floor(s/3600), m=Math.floor(s%3600/60), ss=s%60;
  return (h?h+':'+String(m).padStart(2,'0'):m)+':'+String(ss).padStart(2,'0'); }
function fmtPace(secPerMi){ if(!isFinite(secPerMi)||secPerMi<=0) return '—'; return fmtDur(secPerMi)+' /mi'; }
function hav(a,b){ const R=6371000,toR=x=>x*Math.PI/180;
  const dLat=toR(b.lat-a.lat), dLon=toR(b.lon-a.lon);
  const s=Math.sin(dLat/2)**2+Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(s)); }

const gps={on:false,paused:false,watch:null,pts:[],dist:0,t0:0,tPaused:0,pauseAt:0,wake:null,err:''};
let gpsTick=null, selectedRun=-1;
function gpsElapsed(){ return gps.on ? (Date.now()-gps.t0-gps.tPaused-(gps.paused?Date.now()-gps.pauseAt:0))/1000 : 0; }
async function gpsStart(){
  if(!navigator.geolocation){ showToast('No GPS available here'); return; }
  gps.on=true; gps.paused=false; gps.pts=[]; gps.dist=0; gps.t0=Date.now(); gps.tPaused=0; gps.err='';
  try{ gps.wake=await navigator.wakeLock.request('screen'); }catch(e){}
  gps.watch=navigator.geolocation.watchPosition(p=>{
    if(gps.paused) return;
    const c=p.coords; if(c.accuracy>40) return;
    const pt={t:Date.now(), lat:c.latitude, lon:c.longitude};
    const last=gps.pts[gps.pts.length-1];
    if(last){
      const d=hav(last,pt), dt=(pt.t-last.t)/1000;
      if(d<2) return;                 // GPS jitter
      if(dt>0 && d/dt>8) return;      // faster than ~3:20/mi = glitch
      gps.dist+=d;
    }
    gps.pts.push(pt);
  }, e=>{ gps.err=e.code===1?'Location permission denied — allow it in Settings, or log the run manually.':'GPS signal lost — still trying.'; renderRunLive(); },
  {enableHighAccuracy:true, maximumAge:1000, timeout:20000});
  clearInterval(gpsTick); gpsTick=setInterval(renderRunLive,1000);
  renderRun();
}
function gpsPause(){ if(!gps.on) return; if(gps.paused){ gps.tPaused+=Date.now()-gps.pauseAt; gps.paused=false; } else { gps.paused=true; gps.pauseAt=Date.now(); } renderRun(); }
function gpsStop(discard){
  navigator.geolocation.clearWatch(gps.watch); clearInterval(gpsTick);
  try{ gps.wake&&gps.wake.release(); }catch(e){}
  const mi=gps.dist/1609.34, dur=gpsElapsed();
  gps.on=false;
  if(discard || mi<0.05){ if(!discard) showToast('Too short to save'); renderRun(); return; }
  // per-mile splits + a downsampled trace
  const splits=[]; let acc=0, nextMi=1, lastT=gps.t0;
  for(let i=1;i<gps.pts.length;i++){
    acc+=hav(gps.pts[i-1],gps.pts[i]);
    if(acc>=nextMi*1609.34){ splits.push(Math.round((gps.pts[i].t-lastT)/1000)); lastT=gps.pts[i].t; nextMi++; }
  }
  const step=Math.max(1,Math.ceil(gps.pts.length/240));
  const trace=gps.pts.filter((_,i)=>i%step===0||i===gps.pts.length-1).map(p=>[+p.lat.toFixed(5),+p.lon.toFixed(5)]);
  if(!state.runs) state.runs=[];
  state.runs.push({d:todayISO(), dur:Math.round(dur), mi:+mi.toFixed(2), splits, pts:trace});
  const iso=todayISO(); const dn=state.done[iso]||(state.done[iso]={}); if(TEMPLATE[DOW].am.kind==='run') dn.am=true;
  save(); selectedRun=state.runs.length-1;
  showToast('Run saved · '+mi.toFixed(2)+' mi'); renderRun(); renderToday(); renderHeader();
}
function renderRunLive(){
  const t=document.getElementById('rl-time'), d=document.getElementById('rl-dist'), p=document.getElementById('rl-pace'), e=document.getElementById('rl-err');
  if(!t) return;
  const el=gpsElapsed(), mi=gps.dist/1609.34;
  t.textContent=fmtDur(el); d.textContent=mi.toFixed(2); p.textContent=mi>0.02?fmtPace(el/mi):'—';
  if(e) e.textContent=gps.err;
}

/* guided interval timer — the week's run structure with beeps */
const timer={on:false,segs:[],idx:0,segEnd:0,paused:false,pauseAt:0,int:null,ctx:null};
function timerPlan(w){
  if(w<=2) return {label:'8 × (run 2:00 / walk 1:00)', segs:Array.from({length:8},()=>[{n:'Run',s:120,h:1},{n:'Walk',s:60,h:0}]).flat()};
  if(w<=4) return {label:'6 × (run 4:00 / walk 1:00)', segs:Array.from({length:6},()=>[{n:'Run',s:240,h:1},{n:'Walk',s:60,h:0}]).flat()};
  const reps=w<=8?6:8;
  return {label:'10:00 easy · '+reps+' × (1:00 hard / 2:00 walk) · 5:00 cooldown',
    segs:[{n:'Warm up easy',s:600,h:0}].concat(Array.from({length:reps},()=>[{n:'HARD',s:60,h:1},{n:'Walk it off',s:120,h:0}]).flat(),[{n:'Cooldown',s:300,h:0}])};
}
function beep(hard){
  try{
    timer.ctx=timer.ctx||new (window.AudioContext||window.webkitAudioContext)();
    timer.ctx.resume();
    [0,0.3].forEach(off=>{
      const o=timer.ctx.createOscillator(), g=timer.ctx.createGain();
      o.type='square'; o.frequency.value=hard?880:440;
      g.gain.setValueAtTime(.25,timer.ctx.currentTime+off);
      g.gain.exponentialRampToValueAtTime(.001,timer.ctx.currentTime+off+.22);
      o.connect(g); g.connect(timer.ctx.destination);
      o.start(timer.ctx.currentTime+off); o.stop(timer.ctx.currentTime+off+.25);
    });
  }catch(e){}
  if(navigator.vibrate) navigator.vibrate(hard?[200,80,200]:200);
}
function timerStart(){
  const plan=timerPlan(Math.max(1,weekNum()));
  timer.on=true; timer.segs=plan.segs; timer.idx=0; timer.paused=false;
  timer.segEnd=Date.now()+plan.segs[0].s*1000;
  beep(plan.segs[0].h);
  clearInterval(timer.int); timer.int=setInterval(timerTick,250);
  renderRun();
}
function timerTick(){
  if(!timer.on||timer.paused) return;
  const left=timer.segEnd-Date.now();
  if(left<=0){
    timer.idx++;
    if(timer.idx>=timer.segs.length){ timerStop(); showToast('Session done — nice work'); return; }
    const s=timer.segs[timer.idx];
    timer.segEnd=Date.now()+s.s*1000; beep(s.h);
    renderRun(); return;
  }
  const el=document.getElementById('t-count'); if(el) el.textContent=fmtDur(left/1000);
}

/* route map: Leaflet + OSM where the network allows, SVG trace otherwise */
let leafMap=null;
function loadLeaflet(){
  return new Promise(res=>{
    if(window.L) return res(true);
    const l=document.createElement('link'); l.rel='stylesheet'; l.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'; document.head.appendChild(l);
    const s=document.createElement('script'); s.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    s.onload=()=>res(true); s.onerror=()=>res(false);
    document.head.appendChild(s);
    setTimeout(()=>res(!!window.L),5000);
  });
}
function svgTrace(el,pts){
  const lats=pts.map(p=>p[0]), lons=pts.map(p=>p[1]);
  const la0=Math.min(...lats), la1=Math.max(...lats), lo0=Math.min(...lons), lo1=Math.max(...lons);
  const kx=Math.cos((la0+la1)/2*Math.PI/180);
  const w=(lo1-lo0)*kx||1e-6, h=(la1-la0)||1e-6, S=Math.max(w,h);
  const px=p=>[ (( (p[1]-lo0)*kx )/S)*84+8, 92-(((p[0]-la0))/S)*84-8+((S-h)/S)*42 ];
  const d=pts.map(p=>px(p).map(v=>v.toFixed(1)).join(',')).join(' ');
  el.innerHTML=`<svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet" style="background:#16181A">
    <polyline points="${d}" fill="none" stroke="#5FD3C6" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${px(pts[0])[0]}" cy="${px(pts[0])[1]}" r="2" fill="#fff"/>
    <circle cx="${px(pts[pts.length-1])[0]}" cy="${px(pts[pts.length-1])[1]}" r="2.4" fill="#5FD3C6"/></svg>`;
}
function renderRunMap(run){
  const el=document.getElementById('runmap'); if(!el) return;
  if(!run.pts||run.pts.length<2){ el.style.display='none'; return; }
  el.style.display='block';
  loadLeaflet().then(ok=>{
    const el2=document.getElementById('runmap'); if(!el2) return;
    if(ok&&window.L){
      if(leafMap){ leafMap.remove(); leafMap=null; }
      el2.innerHTML='';
      leafMap=L.map(el2,{zoomControl:false,attributionControl:true});
      L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(leafMap);
      const line=L.polyline(run.pts,{color:'#0E7C74',weight:4}).addTo(leafMap);
      leafMap.fitBounds(line.getBounds(),{padding:[18,18]});
    } else svgTrace(el2, run.pts);
  });
}

  const isBarcode=/^\d{8,14}$/.test(q.replace(/\s/g,''));
  const url = isBarcode
    ? 'https://world.openfoodfacts.org/api/v2/product/'+q.replace(/\s/g,'')+'.json?fields=product_name,brands,nutriments,serving_quantity'
    : 'https://world.openfoodfacts.org/cgi/search.pl?search_terms='+encodeURIComponent(q)+'&search_simple=1&action=process&json=1&page_size=6&fields=product_name,brands,nutriments';
  fetch(url).then(r=>r.json()).then(j=>{
    const prods = isBarcode ? (j.product?[j.product]:[]) : (j.products||[]);
    offResults=prods.map(p=>{const n=nutrOf(p); return {name:p.product_name||'(unnamed)', brand:p.brands||'', k:n.k, p:n.p, g:Math.round(p.serving_quantity)||100};})
      .filter(r=>r.k>0);
    offPick=null;
    if(!offResults.length) out.innerHTML='<p class="fine" style="margin:10px 0 0">Nothing found — try a simpler name or the barcode digits.</p>';
    else renderOffOut();
  }).catch(()=>{
    if(attempt<3){ setTimeout(()=>offSearch(q, attempt+1), 1200*attempt); return; }
    out.innerHTML='<p class="fine" style="margin:10px 0 0">Couldn’t reach the food database — it rate-limits bursts, so wait a moment and search again. (Inside the claude.ai artifact this feature is blocked entirely; use the github.io app.)</p>';
  });
}
async function startScan(){
  try{
    const video=document.getElementById('scanvideo');
    scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    video.srcObject=scanStream; video.style.display='block'; await video.play();
    const det=new BarcodeDetector({formats:['ean_13','upc_a','ean_8','upc_e','code_128']});
    scanTimer=setInterval(async()=>{
      try{
        const codes=await det.detect(video);
        if(codes.length){ const code=codes[0].rawValue; stopScan(true); document.getElementById('offq').value=code; showToast('Barcode '+code); offSearch(code); }
      }catch(e){}
    },350);
  }catch(e){
    stopScan(true);
    const out=document.getElementById('offout');
    if(out) out.innerHTML='<p class="fine" style="margin:10px 0 0">Camera unavailable — type the barcode digits instead.</p>';
  }
}
function stopScan(hide){
  clearInterval(scanTimer); scanTimer=null;
  if(scanStream){ scanStream.getTracks().forEach(t=>t.stop()); scanStream=null; }
  const v=document.getElementById('scanvideo');
  if(v&&hide){ v.style.display='none'; v.srcObject=null; }
}

function renderTrend(){
  const ws=[...state.weights].sort((a,b)=>a.d<b.d?-1:1);
  const latest=ws.length?ws[ws.length-1]:null;
  const a7=avgWindow(7,0), rate=weeklyRate(), w=weekNum();
  let advice='', cls='';
  if(rate==null) advice='Weigh in most mornings; the 7-day average is the only number worth judging.';
  else if(w<=2) advice=`Losing ${rate.toFixed(1)} lbs/wk. Weeks 1–2 are water and glycogen — enjoy it, don’t extrapolate it.`;
  else if(rate<1.25){ cls='style="color:var(--warn)"'; advice=`Down ${rate.toFixed(1)} lbs/wk — under the 1.5–2 target. If this holds two straight weeks: cut 100 calories or add 10 minutes to the walks. Hard floor is 1,800 — below that the fix is more walking or a diet break, never less food.`; }
  else if(rate>2.25){ cls='style="color:var(--crit)"'; advice=`Down ${rate.toFixed(1)} lbs/wk — too fast, you’re burning muscle. Add 100–150 calories back.`; }
  else advice=`Down ${rate.toFixed(1)} lbs/wk — right in the 1.5–2 pocket. Change nothing.`;
  const cur = a7!=null?a7:(latest?latest.w:null);
  const miles=[{w:175,l:'175 lb'},{w:170,l:'170 lb'},{w:165,l:'165 lb'},{w:160,l:'160 lb · goal'}];
  const sorted=[...state.weights].sort((a,b)=>a.d<b.d?-1:1);
  function hitWeek(mw){ // week the milestone was first reached
    const p=sorted.find(p=>p.w<=mw); if(!p) return '';
    return 'Wk '+Math.max(1,Math.floor((parseISO(p.d)-parseISO(state.start))/(7*864e5))+1);
  }
  function etaMonth(mw){ // rough month at the current rate
    if(rate==null||rate<0.3||cur==null) return '';
    const d=new Date(); d.setDate(d.getDate()+Math.round((cur-mw)/rate*7));
    return d.toLocaleDateString(undefined,{month:'short'});
  }
  let nextFound=false;
  const mrows = miles.map(m=>{
    const done = cur!=null && cur<=m.w;
    const next = !done && !nextFound && cur!=null; if(next) nextFound=true;
    const right = done?hitWeek(m.w):next?(cur-m.w).toFixed(1)+' to go':etaMonth(m.w);
    return `<div class="milestone ${done?'done':next?'next':'todo'}">
      <div class="mk">${done?'✓':next?'◐':''}</div>
      <div style="flex:1;font-weight:700;font-size:14px">${m.l}</div>
      <div style="font-size:11.5px;font-weight:${next?'700':'500'};color:${next?'var(--teal)':'var(--sub)'}" class="num">${right}</div>
    </div>`;
  }).join('');
  const goal=estGoalDate();
  document.getElementById('tab-trend').innerHTML=`
    <div class="eyebrow au"><span style="font-size:20px;font-weight:800;letter-spacing:-.02em;text-transform:none;color:var(--ink)">Trend</span><span class="note">since ${fmtShort(state.start)}</span></div>
    <div class="hero au" style="animation-delay:.06s">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <div class="big num" style="font-size:30px">${latest?latest.w.toFixed(1):'—'}<span style="font-size:14px;color:var(--hero-sub);font-weight:500"> lb</span></div>
        <div style="font-weight:700;font-size:13px" class="mint num">${latest?'−'+(180-latest.w).toFixed(1)+' total':''}</div>
      </div>
      <div class="chartbox" id="chartbox" style="margin-top:8px"><div class="tip" id="tip"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:9.5px;font-weight:500;color:var(--hero-sub)"><span>Wk 1 · 180</span><span>goal 160</span></div>
    </div>
    <div class="au" style="display:grid;grid-template-columns:1fr 1fr;gap:11px;animation-delay:.1s">
      <div class="wcard" style="margin:0"><div style="font-weight:600;font-size:10px;letter-spacing:.04em;color:var(--mut)">AVG RATE</div><div style="font-weight:800;font-size:20px;margin-top:7px" class="num">${rate!=null?'−'+Math.abs(rate).toFixed(1):'—'}<span style="font-size:11px;color:var(--sub);font-weight:500"> lb/wk</span></div><div class="fine" style="margin-top:3px">target 1.5–2</div></div>
      <div class="wcard" style="margin:0"><div style="font-weight:600;font-size:10px;letter-spacing:.04em;color:var(--mut)">EST. GOAL DATE</div><div style="font-weight:800;font-size:20px;margin-top:7px">${goal||'—'}</div><div class="fine" style="margin-top:3px">${goal?'at current rate':'needs more data'}</div></div>
    </div>
    <div class="eyebrow au" style="animation-delay:.12s"><span>Log a weigh-in</span></div>
    <div class="wcard au" style="animation-delay:.13s">
      <div class="weightform">
        <input type="number" id="wval" inputmode="decimal" step="0.1" placeholder="180.0" aria-label="weight in pounds">
        <input type="date" id="wdate" value="${todayISO()}" aria-label="weigh-in date">
        <button class="btn" id="wadd">Log</button>
      </div>
      <p class="sub" ${cls} style="margin-bottom:0;margin-top:10px">${advice}</p>
    </div>
    <div class="eyebrow au" style="animation-delay:.14s"><span>Checkpoints</span></div>
    <div class="au" style="animation-delay:.16s">${mrows}</div>
    <div class="wcard scrollx">
      <table class="plain">
        <tr><td class="num" style="width:86px"><b>Week 2</b></td><td class="sub" style="margin:0">3–5 lbs down (water-heavy, expected). Training rhythm established.</td></tr>
        <tr><td class="num"><b>Week 6</b></td><td class="sub">9–11 down, around 169–171. Running 30 min continuous. First diet-break decision point.</td></tr>
        <tr><td class="num"><b>Week 10</b></td><td class="sub">13–16 down, mid 160s. Recalculate calories for the lighter body.</td></tr>
        <tr><td class="num"><b>Wk 14–18</b></td><td class="sub">Landing 155–162. Transition to ~2,300–2,400 maintenance, keep the training.</td></tr>
      </table>
    </div>
    <div class="callout crit"><b>Deficit warning signs</b> — any two at once means take the diet break early: lifts regressing a week straight · waking at 3 AM · irritability someone else comments on · constant cold hands · every run feeling like mile 20.</div>
    <div class="eyebrow"><span>Your data</span></div>
    <div class="wcard" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <button class="btn chipbtn" data-export>Export backup</button>
      <label class="btn ghost" style="cursor:pointer">Import backup<input type="file" id="importfile" accept=".json,application/json" style="display:none"></label>
      <span class="fine" style="flex:1;min-width:160px">Everything lives in this browser — export before switching phones, import to restore.</span>
    </div>
    ${ws.length?`<div class="eyebrow"><span>Entries</span></div><div class="wcard scrollx"><table class="plain">
      ${[...ws].reverse().slice(0,14).map(p=>`<tr><td class="num">${fmtShort(p.d)}</td><td class="num">${p.w.toFixed(1)}</td>
      <td style="text-align:right"><button class="btn ghost" style="padding:3px 9px;font-size:11px" data-del="${p.d}">delete</button></td></tr>`).join('')}
    </table></div>`:''}`;
  document.getElementById('wadd').onclick=()=>{
    const v=parseFloat(document.getElementById('wval').value), d=document.getElementById('wdate').value;
    if(!v||!d) return;
    state.weights=state.weights.filter(p=>p.d!==d);
    state.weights.push({d,w:v}); save(); renderTrend(); renderToday(); showToast('Weigh-in logged');
  };
  document.querySelectorAll('#tab-trend [data-del]').forEach(b=>b.onclick=()=>{
    state.weights=state.weights.filter(p=>p.d!==b.dataset.del); save(); renderTrend(); renderToday();
  });
  drawChart();
}

/* chart inside the dark hero — mint series, goal band, animated draw, hover crosshair */
function drawChart(){
  const box=document.getElementById('chartbox'); if(!box) return;
  const ws=[...state.weights].sort((a,b)=>a.d<b.d?-1:1);
  const W=520,H=190,L=34,R=10,T=10,B=22;
  if(ws.length<1){
    box.innerHTML='<p style="padding:20px 4px;text-align:center;color:var(--hero-sub);font-size:12.5px;margin:0">Log your first weigh-in above — the trend and the weekly rate build from it.</p>';
    return;
  }
  const t0=parseISO(ws[0].d).getTime();
  const t1=Math.max(parseISO(ws[ws.length-1].d).getTime(), t0+14*864e5);
  const vals=ws.map(p=>p.w);
  const yMax=Math.max(...vals,180)+1, yMin=Math.min(...vals,160)-1;
  const X=t=>L+(t-t0)/(t1-t0)*(W-L-R);
  const Y=v=>T+(yMax-v)/(yMax-yMin)*(H-T-B);
  let g='';
  // the arc to beat: a straight dashed line from the 180 start to the 160 goal
  g+=`<line x1="${L}" y1="${Y(180)}" x2="${W-R}" y2="${Y(160)}" stroke="#2B2E31" stroke-width="1" stroke-dasharray="3 3"/>`;
  const pts=ws.map(p=>[X(parseISO(p.d).getTime()),Y(p.w)]);
  if(pts.length>1) g+=`<path class="trendline" pathLength="300" stroke-dasharray="300" stroke-dashoffset="300" style="animation:drawLine 1.2s .15s ease forwards" d="M${pts.map(p=>p[0].toFixed(1)+' '+p[1].toFixed(1)).join('L')}" fill="none" stroke="#5FD3C6" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>`;
  const lp=pts[pts.length-1];
  g+=`<circle cx="${lp[0]}" cy="${lp[1]}" r="4.5" fill="#5FD3C6"/>`;
  g+=`<line id="xh" x1="0" x2="0" y1="${T}" y2="${H-B}" stroke="#4A4E52" stroke-width="1" visibility="hidden"/>`;
  box.innerHTML=`<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Weight trend from ${ws[0].w} to ${ws[ws.length-1].w} pounds">${g}</svg><div class="tip"></div>`;
  const svg=box.querySelector('svg'), xh=svg.querySelector('#xh'), tip=box.querySelector('.tip');
  function onmove(ev){
    const r=svg.getBoundingClientRect();
    const cx=ev.touches?ev.touches[0].clientX:ev.clientX;
    const mx=(cx-r.left)/r.width*W;
    let best=0,bd=1e9;
    pts.forEach((p,i)=>{const d=Math.abs(p[0]-mx); if(d<bd){bd=d;best=i;}});
    const p=pts[best];
    xh.setAttribute('x1',p[0]); xh.setAttribute('x2',p[0]); xh.setAttribute('visibility','visible');
    tip.style.display='block';
    tip.style.left=(p[0]/W*100)+'%';
    tip.style.top=(p[1]/H*100)+'%';
    tip.textContent=fmtShort(ws[best].d)+' · '+ws[best].w.toFixed(1)+' lb';
  }
  svg.addEventListener('mousemove',onmove);
  svg.addEventListener('touchstart',onmove,{passive:true});
  svg.addEventListener('touchmove',onmove,{passive:true});
  svg.addEventListener('mouseleave',()=>{tip.style.display='none';xh.setAttribute('visibility','hidden');});
}

  const wb=T.closest('[data-water]');

  const mb=T.closest('[data-meal]');
  if(mb){ const f=fuelToday(); const k=mb.dataset.meal; f.meals[k]=!f.meals[k]; saveFuel(f); refreshFuelViews(); if(f.meals[k]) showToast(MEAL_PRESETS[k].n+' logged'); return; }
  const qa=T.closest('[data-qa]');

  if(T.closest('[data-addfood]')){

  }

  if(xb){ const f=fuelToday(); f.extra.splice(+xb.dataset.delextra,1); saveFuel(f); refreshFuelViews(); return; }
  if(T.closest('[data-scan]')){ startScan(); return; }
  if(T.closest('[data-search]')){ const q=document.getElementById('offq').value.trim(); if(q) offSearch(q); return; }
  const pk=T.closest('[data-pick]');

  if(T.closest('[data-offback]')){ offPick=null; renderOffOut(); return; }
  if(T.closest('[data-offadd]')){

  if(T.closest('[data-skiprest]')){ restEnd=0; renderTrain(); return; }

      WORKOUTS[currentDay].ex.forEach(ex=>{
        const arr=state.logs[ex.id]||[];
        const i=arr.findIndex(x=>x.d===todayISO());
        if(i>=0) arr.splice(i,1);
      });
      overrideEx=null; restEnd=0; save(); renderTrain();
    } return;
  }
  const ln=T.closest('[data-liftnow]');
  if(ln){ overrideEx=ln.dataset.liftnow; renderTrain(); return; }
  const xp=T.closest('[data-expand]');

  const er=T.closest('[data-exrow]');

  if(T.closest('[data-gpsstart]')){ gpsStart(); return; }
  if(T.closest('[data-gpspause]')){ gpsPause(); return; }
  if(T.closest('[data-gpsfinish]')){ gpsStop(false); return; }
  if(T.closest('[data-gpsdiscard]')){ if(confirm('Discard this run?')) gpsStop(true); return; }
  if(T.closest('[data-runmanual]')){

      if(!state.runs) state.runs=[];

  const rv=T.closest('[data-runview]');
  if(rv){ selectedRun=+rv.dataset.runview; renderRun(); return; }
  const rd=T.closest('[data-rundel]');
  if(rd){ if(confirm('Delete this run?')){ state.runs.splice(+rd.dataset.rundel,1); selectedRun=-1; save(); renderRun(); } return; }
  if(T.closest('[data-tstart]')){ timerStart(); return; }
  if(T.closest('[data-tpause]')){ timerPause(); return; }
  if(T.closest('[data-tskip]')){ timerSkip(); return; }
  if(T.closest('[data-tstop]')){ timerStop(); return; }
  if(T.closest('[data-export]')){
    const blob=new Blob([JSON.stringify(state,null,1)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='cadence-backup-'+todayISO()+'.json'; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),5000); showToast('Backup downloaded'); return;
  }
  const go=T.closest('[data-go]');
  if(go){ if(go.dataset.day){ currentDay=go.dataset.day; renderTrain(); } showTab(go.dataset.go); return; }
  const dk=T.closest('[data-dayk]');
  if(dk){ currentDay=dk.dataset.dayk; overrideEx=null; renderTrain(); }
});

  if(e.key==='Enter'&&e.target.id==='offq'){ const q=e.target.value.trim(); if(q) offSearch(q); }
});

/* ---------------- Apple Health sync (native shell only — no-op on the web) ---------------- */
function HK(){
  const C=window.Capacitor;
  return (C && C.isNativePlatform && C.isNativePlatform() && C.Plugins && C.Plugins.HealthPlugin) || null;
}
let hkSyncing=false;
async function healthSync(){
  const hk=HK(); if(!hk||hkSyncing) return;
  hkSyncing=true;
  try{
    const av=await hk.isHealthAvailable(); if(!av.available) return;
    await hk.requestHealthPermissions({permissions:['READ_WORKOUTS','READ_ACTIVE_CALORIES','READ_ROUTE','READ_DISTANCE']});
    const now=new Date();
    // today's active burn from the Watch
    try{
      const dayStart=new Date(now.getFullYear(),now.getMonth(),now.getDate());
      const agg=await hk.queryAggregated({startDate:dayStart.toISOString(), endDate:now.toISOString(), dataType:'active-calories', bucket:'day'});
      const rows=agg.aggregatedData||agg.aggregated||agg.samples||[];
      const kcal=Math.round(rows.reduce((a,b)=>a+(+b.value||0),0));
      if(kcal>0){ if(!state.burn) state.burn={}; state.burn[todayISO()]=kcal; }
    }catch(e){}
    // workouts from the last 14 days: runs (with routes) + strength sessions
    const res=await hk.queryWorkouts({startDate:new Date(Date.now()-14*864e5).toISOString(), endDate:now.toISOString(), includeHeartRate:false, includeRoute:true, includeSteps:false});
    if(!state.runs) state.runs=[];
    let added=0;
    (res.workouts||[]).forEach(w=>{
      const type=(w.workoutType||'').toLowerCase();
      const startD=new Date(w.startDate); if(isNaN(startD)) return;
      const iso=isoOf(startD);
      const key=w.id||('hk-'+w.startDate);
      const dayAm=(TEMPLATE[startD.getDay()]||{}).am||{};
      if(type.includes('run')){
        if(state.runs.some(r=>r.hk===key)) return;
        let dur=+w.duration||Math.round((new Date(w.endDate)-startD)/1000);
        if(dur>50000) dur=Math.round(dur/1000);              // defensive: ms vs s
        let mi=+w.distance||0; if(mi>100) mi=mi/1609.34;      // defensive: meters vs miles
        if(!mi||!dur) return;
        let pts=(w.route&&w.route.length>1)? w.route.map(p=>[+p.lat.toFixed(5),+p.lng.toFixed(5)]) : null;
        if(pts&&pts.length>240){ const st=Math.ceil(pts.length/240); pts=pts.filter((_,i)=>i%st===0||i===pts.length-1); }
        state.runs.push({d:iso, dur, mi:+mi.toFixed(2), splits:[], pts, hk:key, src:w.sourceName||'Apple Health'});
        const dn=state.done[iso]||(state.done[iso]={});
        if(dayAm.kind==='run') dn.am=true;
        added++;
      } else if(type.includes('strength')||type.includes('functional')||type.includes('cross training')){
        const dn=state.done[iso]||(state.done[iso]={});
        if(dayAm.tab==='train'&&!dn.am){ dn.am=true; added++; }
      }
    });
    state.runs.sort((a,b)=>a.d<b.d?-1:1);
    save();
    if(added){ showToast('Synced '+added+' from Apple Health'); renderAll(); }
    else { renderHeader(); renderToday(); }
  }catch(e){}
  finally{ hkSyncing=false; }
}
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) healthSync(); });

/* Apple Watch bridge: a Shortcut can open ?burn=<active kcal> and it lands here */
(function(){
  const q=new URLSearchParams(location.search);
  const b=Math.round(+q.get('burn'));
  if(b>0){ if(!state.burn) state.burn={}; state.burn[todayISO()]=b; save();
    history.replaceState(null,'',location.pathname); setTimeout(()=>showToast('Watch burn synced: '+b+' cal'),400); }
})();
if('serviceWorker' in navigator && (location.protocol==='https:'||location.hostname==='127.0.0.1')){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
function renderAll(){ renderHeader(); renderToday(); renderTrain(); renderRun(); renderEat(); renderShop(); renderTrend(); }
renderAll();
healthSync();
</script>
